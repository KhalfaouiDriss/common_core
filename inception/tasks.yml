project: medicAtlas
phase: Research & Discovery
version: 1.0.0
objective: Define architectural foundations and non-obvious constraints for national digital infrastructure.
status: mandatory_pre_coding

# Research Track Definitions
tracks:
  - id: T1
    title: Healthcare Data Standards
    priority: critical
    status: pending
    topics:
      - System interoperability
      - HL7 & FHIR implementation
      - ICD-10/ICD-11 & LOINC classification
    deliverables:
      - standards_alignment_report.md
      - risk_assessment_of_custom_models.pdf

  - id: T2
    title: Identity, Authentication & Authorization
    priority: critical
    status: pending
    topics:
      - Identity models (Patients vs. Professionals)
      - RBAC vs. ABAC for healthcare
      - Consent models (Explicit/Implicit/Emergency)
      - Identity verification in remote areas
    deliverables:
      - identity_model_diagram.png
      - access_control_matrix.xlsx
      - audit_principles.md

  - id: T3
    title: Lifelong Medical Record Modeling
    priority: critical
    status: pending
    topics:
      - Event-based vs. state-based records
      - Append-only data architecture
      - Temporal data & historical correctness
      - Correction vs. deletion mechanisms
    deliverables:
      - conceptual_data_model.md
      - patient_timeline_examples.pdf
      - update_correction_strategy.md

  - id: T4
    title: Offline-First Architecture & Synchronization
    priority: high
    status: pending
    topics:
      - Offline-first system design
      - Sync models and conflict resolution
      - Data integrity under partial failure
      - Event logs vs. snapshot syncing
    deliverables:
      - sync_flow_diagrams.png
      - conflict_resolution_rules.md
      - connectivity_assumptions.pdf

  - id: T5
    title: Security, Privacy & Threat Modeling
    priority: critical
    status: pending
    topics:
      - Threat modeling for health data
      - Insider threat mitigation
      - Key management (KMS) strategy
      - Immutable audit logs
    deliverables:
      - threat_model_matrix.md
      - encryption_strategy_at_rest.pdf
      - logging_auditing_architecture.md

  - id: T6
    title: Data Analytics & Public Health Use
    priority: medium
    status: pending
    topics:
      - Anonymization vs. pseudonymization
      - Re-identification risk analysis
      - Isolation of operational vs. analytical systems
      - Ethical data usage frameworks
    deliverables:
      - privacy_preserving_analytics_strategy.md
      - system_boundary_definitions.pdf

# Final Consolidation Phase
synthesis:
  prerequisites:
    - completion_of_all_tracks
  deliverables:
    - high_level_system_architecture
    - core_data_flow_mapping
    - non_functional_requirements_spec
    - out_of_scope_boundary_list
    - risk_and_unknowns_registry

# Guiding Constraints
constraints:
  no_production_code: true
  no_framework_lockin: true
  documentation_mandatory: true
  focus: "Long-term scalability and national trust"